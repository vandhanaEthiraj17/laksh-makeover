
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laksh Makeover Artistry | Ethereal Elegance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-silk: #fff9f5;
        --color-rose: #fdf2f2;
        --color-lavender: #f3f0ff;
        --color-gold: #d4af37;
        --color-crimson: #c53030;
      }
      body {
        font-family: 'Montserrat', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }
      h1, h2, h3, h4, .serif {
        font-family: 'Playfair Display', serif;
      }
      
      /* Dynamic Background - More Attracting Pastel Shift */
      .dynamic-bg {
        background: linear-gradient(-45deg, #fff9f5, #fef2f2, #f5f3ff, #fff1f2);
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
      }

      .ethereal-glow:hover {
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
      }

      .shimmer-btn {
        position: relative;
        overflow: hidden;
      }
      .shimmer-btn::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(transparent, rgba(255,255,255,0.4), transparent);
        transform: rotate(45deg);
        transition: 0.8s;
      }
      .shimmer-btn:hover::after {
        left: 100%;
        top: 100%;
      }

      .grainy-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("https://www.transparenttextures.com/patterns/p6.png");
        opacity: 0.08;
        pointer-events: none;
        z-index: 9999;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #fdf2f2;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-gold);
        border-radius: 10px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
  <body class="text-[#2a2a2a]">
    <div class="dynamic-bg"></div>
    <div class="grainy-overlay"></div>
    <div id="root"></div>
  </body>
</html>
